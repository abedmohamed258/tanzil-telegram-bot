version: '3.8'

services:
  bot:
    image: ${IMAGE_TAG}
    container_name: tanzil-bot
    restart: always
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - LOG_FORMAT=json
      - DATABASE_URL=sqlite:////app/data/tanzil.db
    volumes:
      - downloads:/app/downloads
      - data:/app/data
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "tanzil", "server", "status"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:1.25-alpine
    container_name: tanzil-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl-params.conf:/etc/nginx/conf.d/ssl-params.conf:ro
      - certs:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    depends_on:
      - bot

  certbot:
    image: certbot/certbot
    container_name: tanzil-certbot
    volumes:
      - certs:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  downloads:
  certs:
  certbot-www:
  data:
