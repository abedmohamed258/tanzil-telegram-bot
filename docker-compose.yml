version: '3.8'

services:
  bot:
    build:
      context: .
      dockerfile: docker/bot.Dockerfile
    image: tanzil-bot:latest
    container_name: tanzil-bot
    restart: always
    command: ["tanzil", "server", "--config", "/app/config.yaml"]
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - LOG_FORMAT=json
      - TANZIL_CORE_HOST=localhost
      - TANZIL_CORE_PORT=8000
      - DATABASE_URL=sqlite:////app/data/tanzil.db
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - downloads:/app/downloads
      - data:/app/data
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:1.25-alpine
    container_name: tanzil-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - bot

volumes:
  downloads:
  data: